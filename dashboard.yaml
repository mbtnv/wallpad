default_page: home

pages:
  - id: home
    title: "1"
    widgets:
      - id: weather
        type: weather
        title: Weather
        weather_entity: weather.yandex_pogoda
        forecast:
          title: Hourly Forecast
          hours: 6
          primary: temperature
          secondary: precipitation_probability
        rows:
          - label: Feels Like
            attribute: apparent_temperature
          - label: Wind
            attribute: wind_speed
          - label: Humidity
            attribute: humidity
          - label: Indoor
            entity: sensor.air_temp
          - label: Indoor Humidity
            entity: sensor.air_hum
          - label: CO2
            entity: sensor.air_co2

  - id: air
    title: "2"
    widgets:
      - id: air_quality
        type: sensor
        title: Air Quality
        entity: sensor.air_co2
        history:
          title: CO2 History
          hours: 24
          points: 48
        rows:
          - label: Temperature
            entity: sensor.air_temp
          - label: Humidity
            entity: sensor.air_hum
