<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WallPad">
    <meta name="theme-color" content="#0e1116">
    <title>Wall Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/apple-touch-icon.png">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div id="clock-time" class="clock-time">--:--</div>
        <div id="clock-date" class="clock-date">Loading date...</div>
      </header>

      <div id="status-bar" class="status" style="display: none;"></div>
      <div id="panels" class="panels"></div>

      <footer class="footer">
        <span id="last-updated">Waiting for first refresh...</span>
      </footer>

      <div id="page-tabs" class="page-tabs" style="display: none;"></div>
    </div>

    <script src="/static/app.js"></script>
  </body>
  </html>
