services:
  wallpad:
    build: .
    container_name: wallpad
    env_file:
      - .env
    environment:
      DASHBOARD_CONFIG_PATH: /data/dashboard.yaml
    volumes:
      - wallpad_data:/data
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    restart: unless-stopped

volumes:
  wallpad_data:
